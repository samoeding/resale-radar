<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resale Radar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);

  --text: #f5f5f5;
  --muted: #8a8a85;

  --accent: #e8ff47;
  --red: #ff4d3a;
  --amber: #ffaa2a;
  --blue: #3ab8ff;
}

body {
  font-family: Inter, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 20% 0%, rgba(232,255,71,0.06), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(58,184,255,0.05), transparent 40%),
    var(--bg);
}

/* HEADER */
header {
  display:flex; justify-content:space-between;
  padding:16px 32px;
  border-bottom:1px solid var(--border);
  backdrop-filter: blur(12px);
}

.logo {
  font-weight:700;
  display:flex; gap:8px; align-items:center;
}
.logo-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--accent);
  animation:pulse 2s infinite;
}
@keyframes pulse { 50% { opacity:.5; transform:scale(.8);} }

/* HERO */
.hero {
  max-width:1100px;
  margin:auto;
  padding:80px 24px 40px;
}

.hero h1 {
  font-size:64px;
  line-height:1;
  letter-spacing:-0.04em;
}

.hero span {
  background:linear-gradient(90deg,#e8ff47,#baff2a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p {
  margin-top:16px;
  color:var(--muted);
}

/* STATS */
.stats {
  display:flex;
  gap:40px;
  margin-top:40px;
}

.stat {
  font-size:28px;
  font-weight:700;
}

/* FILTER + SORT BAR */
.controls {
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

.group {
  display:flex;
  gap:10px;
}

.filter {
  padding:6px 14px;
  border-radius:20px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:.2s;
  font-size:13px;
}

.filter:hover {
  transform:translateY(-1px);
}

.filter.active {
  background:var(--accent);
  color:black;
  box-shadow:0 0 12px rgba(232,255,71,0.4);
}

/* GRID */
.grid {
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  transition:.3s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  animation:enter .5s forwards;
}

@keyframes enter {
  to { opacity:1; transform:none;}
}

.card:hover {
  transform:translateY(-6px);
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* glow */
.card::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:16px;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.2),transparent);
  opacity:0;
  transition:.3s;
}
.card:hover::before { opacity:1; }

.title {
  font-weight:700;
  margin-bottom:10px;
  font-size:15px;
}

.multiple {
  font-size:32px;
  font-weight:800;
  margin-bottom:6px;
}

/* sparkline */
.sparkline {
  width:100%;
  height:40px;
  margin-top:8px;
}

.sparkline polyline {
  fill:none;
  stroke-width:2;
}

/* expand */
.card.expanded {
  transform:scale(1.02);
  background:rgba(255,255,255,0.06);
}

.extra {
  margin-top:10px;
  display:none;
  color:var(--muted);
  font-size:13px;
}

.card.expanded .extra {
  display:block;
  animation:fade .3s;
}

@keyframes fade {
  from { opacity:0; transform:translateY(10px);}
  to { opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Resale Radar</div>
  <div id="updated">loading...</div>
</header>

<div class="hero">
  <h1>Buy retail.<br><span>Sell at a premium.</span></h1>
  <p>Ticket opportunities with resale upside.</p>

  <div class="stats">
    <div class="stat" id="total">0</div>
    <div class="stat" id="now">0</div>
    <div class="stat" id="max">0×</div>
  </div>
</div>

<div class="controls">
  <div class="group">
    <div class="filter active" data-type="all">All</div>
    <div class="filter" data-type="sports">Sports</div>
    <div class="filter" data-type="concert">Concert</div>
  </div>

  <div class="group">
    <div class="filter active" data-sort="multiple">Top</div>
    <div class="filter" data-sort="urgency">Urgency</div>
    <div class="filter" data-sort="name">Name</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
let events = [];
let filter = "all";
let sortBy = "multiple";

/* parse multiple */
function getMaxMultiple(m) {
  const nums = m.match(/[\\d.]+/g);
  if (!nums) return 0;
  return Math.max(...nums.map(Number));
}

/* sparkline data */
function generateTrend(value) {
  const arr = [];
  for (let i=0;i<8;i++){
    arr.push(value + (Math.random()-0.5)*0.6);
  }
  return arr;
}

function sparklineSVG(data,color){
  const max=Math.max(...data);
  const min=Math.min(...data);

  const points=data.map((d,i)=>{
    const x=(i/(data.length-1))*100;
    const y=100-((d-min)/(max-min||1))*100;
    return `${x},${y}`;
  }).join(" ");

  return `<svg class="sparkline" viewBox="0 0 100 100"><polyline points="${points}" stroke="${color}" /></svg>`;
}

/* sorting */
function sortEvents(arr){
  if(sortBy==="multiple"){
    return arr.sort((a,b)=>getMaxMultiple(b.multiple)-getMaxMultiple(a.multiple));
  }
  if(sortBy==="urgency"){
    const rank={now:3,soon:2,watch:1};
    return arr.sort((a,b)=>rank[b.urgency]-rank[a.urgency]);
  }
  if(sortBy==="name"){
    return arr.sort((a,b)=>a.name.localeCompare(b.name));
  }
  return arr;
}

/* render */
function render(){
  const grid=document.getElementById("grid");

  let filtered=events.filter(e=>filter==="all"||e.type.toLowerCase()===filter);
  filtered=sortEvents(filtered);

  grid.innerHTML=filtered.map((e,i)=>{
    const val=getMaxMultiple(e.multiple);
    const trend=generateTrend(val);

    let color="#3ab8ff";
    if(e.urgency==="now") color="#ff4d3a";
    if(e.urgency==="soon") color="#ffaa2a";

    return `
    <div class="card" style="animation-delay:${i*0.05}s">
      <div class="title">${e.name}</div>
      <div class="multiple">${e.multiple}</div>
      ${sparklineSVG(trend,color)}
      <div class="extra">
        <div>${e.on_sale}</div>
        <div>${e.best_bets}</div>
      </div>
    </div>`;
  }).join("");

  document.querySelectorAll(".card").forEach(c=>{
    c.onclick=()=>c.classList.toggle("expanded");
  });
}

/* filters */
document.querySelectorAll("[data-type]").forEach(f=>{
  f.onclick=()=>{
    document.querySelectorAll("[data-type]").forEach(x=>x.classList.remove("active"));
    f.classList.add("active");
    filter=f.dataset.type;
    render();
  };
});

/* sorting */
document.querySelectorAll("[data-sort]").forEach(f=>{
  f.onclick=()=>{
    document.querySelectorAll("[data-sort]").forEach(x=>x.classList.remove("active"));
    f.classList.add("active");
    sortBy=f.dataset.sort;
    render();
  };
});

/* animate numbers */
function animate(el,target){
  let val=0;
  const step=target/25;
  const i=setInterval(()=>{
    val+=step;
    if(val>=target){
      val=target;
      clearInterval(i);
    }
    el.textContent=Math.floor(val);
  },20);
}

/* load data */
fetch("events.json")
.then(r=>r.json())
.then(data=>{
  events=data.events;

  animate(document.getElementById("total"),events.length);

  animate(document.getElementById("now"),
    events.filter(e=>e.urgency==="now").length
  );

  let max=0;
  events.forEach(e=>{
    const m=getMaxMultiple(e.multiple);
    if(m>max) max=m;
  });

  document.getElementById("max").textContent=max+"×";
  document.getElementById("updated").textContent="updated "+data.last_updated;

  render();
});
</script>

</body>
</html>
